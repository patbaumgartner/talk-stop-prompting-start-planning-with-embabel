spring.application.name=03-embabel-pii-guardrails

# LLM configuration
embabel.models.default-llm=gpt-5-mini

# Presidio Analyzer — runs as a Docker sidecar (see docker-compose.yml)
presidio.analyzer.base-url=http://localhost:5002
presidio.analyzer.pii-types=PERSON,EMAIL_ADDRESS,PHONE_NUMBER,CREDIT_CARD,IBAN_CODE,IP_ADDRESS

# Embabel planning and action logging
logging.level.com.embabel=INFO
logging.level.com.patbaumgartner.embabel=DEBUG
