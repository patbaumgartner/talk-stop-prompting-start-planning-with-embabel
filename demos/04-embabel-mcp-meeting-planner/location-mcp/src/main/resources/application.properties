spring.application.name=location-mcp

# MCP Server — stdio transport (launched as a subprocess by the agent)
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=location-mcp
spring.ai.mcp.server.version=1.0.0

# Suppress banner and web server (stdio only)
spring.main.web-application-type=none
spring.main.banner-mode=off
spring.main.log-startup-info=false
